    <h2 class="titulo_secundario">Entre em contato</h2>

    <form action="" method="" autocomplete="off">

        <label for="nomepessoa">nome</label>
        <input type="text" name="nomepessoa" id="nome pessoa" minlength="3" maxlength="15" required>
        <br><br>

        <label for="email">Email</label>
        <input type="email" name="email" id="email" required>
        <button type="submit">Enviar</button>
        <br><br>

        <label for="ano"> Ano de nascimento</label>
        <input type="number" id="ano" name="ano" max="2026" min="1900" placeholder="informe seu telefone">
        <br> <br>

        <label for="telefone">Telefone</label>
        <input type="tel" name="telefone" id="telefone" minlength="10" maxlength="10" min="1900" max="2026" placeholder="informe seu telefone">
        <br><br>

        <label for="git hub">Git hub</label>
        <input type="url" name="github" id="github" placeholder="informe seu git hub">
        <br><br>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha">
        <br> <br>

        <label for="file">Inserir arquivo</label>
        <input type="file" id="arquivo" name="arquivo">
        <br> <br>

        <label for="cor">Escolha a cor</label>
        <input type="color" id="cor" name="cor">
        <br> <br>

        <label for="data"> informe uma data</label>
        <input type="date" name="data" id="data">
        <br> <br>

        <label for="mês"> Informe o mês</label>
        <input type="month" name="Mês" id="Mês">
        <br> <br>

        <label for="semana"> Define uma semana</label>
        <input type="week" name="semana" id="semana">
        <br> <br>

        <label for="hora"> Defina uma hora</label>
        <input type="time" name="hora" id="hora">
        <br> <br>

        <label for="pesquisa">Pesquisa</label>
        <input type="search" name="pesquisa" id="pesquisa">
        <button type="submit">Enviar</button>
        <br> <br>

        <label for="descrição">informe aqui o que voce gosta nos filmes</label>
        <br> <br>
        <textarea cols="50" rows="5" name="descrição" id="descrição"></textarea>

        <fieldset>
            <legend>Qual é o seu filme favorito</legend>
            <label>
                <input type="radio" name="filme" value="Filme 1"> Filme 1
            </label>
            <label>
                <input type="radio" name="filme" value="Filme 2" checked> Filme 2
            </label>
            <label>
                <input type="radio" name="filme" value="Filme 3"> Filme 3
            </label>
        </fieldset>

        <select>
            <strong>
                <option value="Filme 1"> Filme 1</option>
                <option value="Filme 2"> Filme 2</option>
                <option value="Filme 3"> Filme 3</option>
            </strong>
        </select>
        <br><br>

        <label for="nivel">ESCOLHA O NIVEL</label>
        <input type="range" max="10" min="1" id="nivel" name="nivel">

        <select name="lista_suspensa" id="lista">
            <optgroup label="Teste de legenda no combobox">
                <option value="Teste 1 ">Teste 1</option>
                <option value="Teste 2 ">Teste 2</option>
                <option value="Teste 3 ">Teste 3</option>
            </optgroup>
            <optgroup label="Teste de legenda no combobox 2 ">
                <option value="Teste 1 ">Teste 1</option>
                <option value="Teste 2 ">Teste 2</option>
                <option value="Teste 3 ">Teste 3</option>
            </optgroup>
        </select>
        <br><br>

        <fieldset>
            <label> <input type="checkbox" name="PHP">PHP</label>
            <label> <input type="checkbox" name="HTML">HTML 5 </label>
            <label> <input type="checkbox" name="css">CSS 3 </label>
            <label> <input type="checkbox" name="JAVASCRIPT">JAVASCRIPT</label>
        </fieldset>
        <br><br>

        <input type="text" id="busca_datalist" list="paises">
        <datalist id="paises">
            <option> BRASIL</option>
            <option> FRANÇA</option>
            <option> ARGENTINA</option>
            <option> ALEMENHA</option>
            <option> INGLATERRA</option>
            <option> ESPANHA</option>
        </datalist>
        <br><br>

        <audio controls muted autoplay loop>
            <source src="/arquivos_aula/musica.mp3" type="audio/mp3">
            navegador não é compativel para executar áudio!
        </audio>
        <br><br>

        <video controls autoplay loop>
            <source src="/arquivos_aula/videoteste.mp4" type="video/mp4">
        </video>
        <br> <br> 


    </form>
